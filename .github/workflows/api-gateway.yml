name: Api Gateway CI/CD

on:
  push:
    branches: ["main", "dev", "release"]
    paths:
      - 'api-gateway/**'
      - 'common/**'
      - '.github/workflows/api-gateway.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make executable gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew :api-gateway:clean :api-gateway:build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Docker build and push
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/api-gateway:latest -f ./api-gateway/Dockerfile .
          docker push ${{ secrets.ECR_REGISTRY }}/api-gateway:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/oneonone
            aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
            docker-compose pull api-gateway
            docker-compose up -d api-gateway
            docker image prune -f