name: Infrastructure Deploy

on:
  push:
    paths:
      - 'eureka-server/**'
      - 'config-server/**'
      - 'api-gateway/**'
      - 'common/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/infra.yml'
      - '.github/workflows/deploy-template.yml'
    branches: [ main, dev, release ]

jobs:
  deploy-infra:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Build & Push Infra Images
        run: |
          docker build -f eureka-server/Dockerfile -t ${{ secrets.ECR_REGISTRY }}/eureka-server:latest .
          docker push ${{ secrets.ECR_REGISTRY }}/eureka-server:latest
          docker build -f config-server/Dockerfile -t ${{ secrets.ECR_REGISTRY }}/config-server:latest .
          docker push ${{ secrets.ECR_REGISTRY }}/config-server:latest
          docker build -f api-gateway/Dockerfile -t ${{ secrets.ECR_REGISTRY }}/api-gateway:latest .
          docker push ${{ secrets.ECR_REGISTRY }}/api-gateway:latest

      - name: Deploy Infra to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/oneonone
            docker compose -f docker-compose.prod.yml pull eureka-server config-server api-gateway
            docker compose -f docker-compose.prod.yml up -d eureka-server config-server api-gateway