server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

spring:
  application:
    name: api-gateway
  config:
    import: "configserver:"
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true  # ??? ?????? ?? ???? ???? ????? ??
              lower-case-service-id: true
          routes:
            - id: user-service-public
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/signup, /api/v1/users/login

            - id: user-service-private
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - AuthenticationFilter

            # Game Service Routes
            - id: game-service
              uri: lb://game-service
              predicates:
                - Path=/api/v1/games/**
            # Point Service Routes
            - id: point-service
              uri: lb://point-service
              predicates:
                - Path=/api/v1/points/**
            # Betting Service Routes
            - id: betting-service
              uri: lb://betting-service
              predicates:
                - Path=/api/v1/bets/**
  data:
    redis:
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: refresh

