server:
  port: 0

spring:
  application:
    name: betting-service
  datasource:
    url:
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect:

management:
  endpoints:
    web:
      exposure:
        include: refresh