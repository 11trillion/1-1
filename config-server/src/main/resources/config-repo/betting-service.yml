server:
  port: 0

spring:
  application:
    name: betting-service
  datasource:
    url: jdbc:postgresql://localhost:5432/oneonone
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect:
        default_schema: bets

management:
  endpoints:
    web:
      exposure:
        include: refresh