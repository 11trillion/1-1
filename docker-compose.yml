version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: oneonone-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: oneonone
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - ./infra/init:/docker-entrypoint-initdb.d
    restart: always

  redis:
    image: redis:7.2
    container_name: oneonone-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: oneonone-zookeeper
    platform: linux/amd64
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

  kafka:
    image: wurstmeister/kafka:latest
    container_name: oneonone-kafka
    platform: linux/amd64
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - zookeeper
    restart: always

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: oneonone-kafka-ui
    platform: linux/amd64
    ports:
      - "9093:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: oneonone-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_READONLY: "false"
    depends_on:
      - kafka
    restart: always

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: oneonone-zipkin
    platform: linux/amd64
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    restart: always

volumes:
  redis_data: